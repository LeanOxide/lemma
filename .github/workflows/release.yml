name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Windows cross-compilation tools
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive directory
        run: mkdir -p dist

      - name: Create tar.gz archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../dist/lemma-${{ matrix.target }}.tar.gz lemma
          cd ../../..

      - name: Create zip archive (Windows)
        if: matrix.archive == 'zip' && matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          cd target/${{ matrix.target }}/release
          zip ../../../dist/lemma-${{ matrix.target }}.zip lemma.exe
          cd ../../..

      - name: Create zip archive (macOS)
        if: matrix.archive == 'zip' && matrix.target == 'x86_64-apple-darwin'
        run: |
          cd target/${{ matrix.target }}/release
          zip ../../../dist/lemma-${{ matrix.target }}.zip lemma
          cd ../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lemma-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-artifacts/ \;
          ls -lh release-artifacts/

      - name: Create version manifest
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Create stable.toml manifest
          cat > release-artifacts/stable.toml << EOF
          # Lemma version manifest
          # This file is used by 'lemma self update' to check for new versions
          version = "${VERSION}"
          EOF

          echo "Created stable.toml with version: ${VERSION}"
          cat release-artifacts/stable.toml

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Upload to Cloudflare R2 (versioned)
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: release-artifacts
          destination-dir: releases/${{ github.ref_name }}
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: false

      - name: Upload to Cloudflare R2 (latest)
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: release-artifacts
          destination-dir: releases/latest
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: true

      - name: Upload version manifest to R2 root
        run: |
          # Upload stable.toml to releases/ root for version checking
          # This requires aws-cli or rclone - using a simple approach with the R2 action
          mkdir -p manifest-only
          cp release-artifacts/stable.toml manifest-only/

      - name: Upload manifest to Cloudflare R2 (root)
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: manifest-only
          destination-dir: manifests
          output-file-url: false
          keep-file-fresh: true
